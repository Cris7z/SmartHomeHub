; PlatformIO Project Configuration File
; SmartHomeHub ESP32-S3 Arduino demo.
; Keep this file portable: generated build files stay in .pio/ and are ignored.

[env:esp32-s3-devkitc-1-n16r8]
platform = espressif32
board = esp32-s3-devkitc-1-n16r8
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_upload.after_reset = watchdog_reset

; The N16R8 board uses a CH340 USB-UART bridge, so route Serial logs to UART0.
build_flags =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0

lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit ILI9341
    adafruit/Adafruit AHTX0
    adafruit/Adafruit NeoPixel
    links2004/WebSockets
