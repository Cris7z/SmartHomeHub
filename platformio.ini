; PlatformIO Project Configuration File
; SmartHomeHub ESP32-S3 Arduino demo migrated from SmartHomeHub.ino

[platformio]
build_dir = D:/A-Soft/DevTools/PlatformIO/ProjectCache/SmartHomeHub/build
libdeps_dir = D:/A-Soft/DevTools/PlatformIO/ProjectCache/SmartHomeHub/libdeps

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Match the Arduino IDE README guidance for ESP32S3 Dev Module.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit ILI9341
    adafruit/Adafruit AHTX0
    adafruit/Adafruit NeoPixel
